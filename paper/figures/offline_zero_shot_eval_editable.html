<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Baihu v2.0 Offline Zero-Shot Evaluation Editable Figures</title>
<style>
body{margin:0;background:#f8fafc;color:#111827;font-family:Arial,Helvetica,sans-serif}.page{max-width:1200px;margin:0 auto;padding:28px}.panel{background:#fff;border:1px solid #d1d5db;border-radius:14px;padding:20px;margin-bottom:22px;box-shadow:0 8px 24px rgba(15,23,42,.06)}h1{font-size:24px;margin:0 0 8px}h2{font-size:18px;margin:0 0 12px}p{color:#6b7280}.wrap{overflow-x:auto;border:1px solid #e5e7eb;border-radius:10px;background:white}svg{display:block;background:white;user-select:none}.draggable{cursor:move}.title{font-size:22px;font-weight:700;fill:#111827}.subtitle,.note{font-size:13px;fill:#6b7280}.label{font-size:13px;fill:#111827}.value{font-size:12px;fill:#111827}.grid{stroke:#e5e7eb;stroke-width:1}.bar1{fill:#94a3b8}.bar2{fill:#4f80ff}button{cursor:pointer;border:1px solid #cbd5e1;background:white;border-radius:8px;padding:8px 12px;margin-right:8px}textarea{width:100%;min-height:150px;border:1px solid #cbd5e1;border-radius:10px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;padding:10px;box-sizing:border-box}
</style>
</head>
<body>
<main class="page">
<section class="panel"><h1>Baihu v2.0 Offline Zero-Shot Evaluation</h1><p>Editable HTML/SVG figures generated from the uploaded CSV. Drag text labels directly inside the SVGs. Use the buttons to copy or download the edited SVG markup.</p><button onclick="resetAll()">Reset labels</button><button onclick="copySvg('overall')">Copy overall SVG</button><button onclick="downloadSvg('overall','baihu_offline_overall.svg')">Download overall SVG</button><button onclick="copySvg('machine')">Copy machine SVG</button><button onclick="downloadSvg('machine','baihu_offline_by_machine.svg')">Download machine SVG</button></section>
<section class="panel"><h2>Figure A. Overall MSE comparison</h2><div class="wrap"><svg id="overall" width="980" height="520" viewBox="0 0 980 520" xmlns="http://www.w3.org/2000/svg"><rect width="980" height="520" fill="#fff"/><text class="title draggable" x="70" y="52">Overall offline zero-shot open-loop MSE</text><text class="subtitle draggable" x="70" y="78">Unweighted mean over 42 paired task-dataset records; lower is better.</text><g id="overallPlot"></g><text class="note draggable" x="70" y="490">checkpoint-390000 is trained on BAIHU_v2.0 for one epoch.</text></svg></div></section>
<section class="panel"><h2>Figure B. Per-machine Joint MSE improvement</h2><div class="wrap"><svg id="machine" width="1180" height="760" viewBox="0 0 1180 760" xmlns="http://www.w3.org/2000/svg"><rect width="1180" height="760" fill="#fff"/><text class="title draggable" x="70" y="52">Per-machine Joint MSE improvement after Baihu v2.0 training</text><text class="subtitle draggable" x="70" y="78">Improvement = (checkpoint-1 MSE - checkpoint-390000 MSE) / checkpoint-1 MSE.</text><g id="machinePlot"></g><text class="note draggable" x="70" y="735">智元G1 is affected by one outlier task and should be verified before final reporting.</text></svg></div></section>
<section class="panel"><h2>SVG markup</h2><textarea id="svgText" readonly></textarea></section>
</main>
<script>
const overall=[{name:'Joint MSE',base:0.113532,trained:0.003893,impr:96.57},{name:'ALL MSE',base:0.153642,trained:0.008692,impr:94.34}];
const machines=[
{name:'青龙',n:6,jb:0.157132,jt:0.000572,ai:98.49,ji:99.64},{name:'智元A2',n:3,jb:0.132757,jt:0.000896,ai:96.65,ji:99.33},{name:'傅利叶GR-2',n:3,jb:0.137993,jt:0.001805,ai:98.36,ji:98.69},{name:'星海图R1',n:3,jb:0.075369,jt:0.000197,ai:95.86,ji:99.74},{name:'乐聚KUAVO',n:3,jb:0.133456,jt:0.000743,ai:97.24,ji:99.44},{name:'松灵Aloha',n:3,jb:0.133968,jt:0.000949,ai:98.53,ji:99.29},{name:'Franka FR3',n:3,jb:0.041619,jt:0.000711,ai:94.18,ji:98.29},{name:'星尘智能S1',n:3,jb:0.135078,jt:0.000822,ai:96.33,ji:99.39},{name:'UR5e',n:3,jb:0.062389,jt:0.000068,ai:90.58,ji:99.89},{name:'方舟无限arx-acone',n:3,jb:0.138172,jt:0.001076,ai:98.88,ji:99.22},{name:'天机',n:3,jb:0.017828,jt:0.000612,ai:97.84,ji:96.57},{name:'Dwheel',n:3,jb:0.176382,jt:0.000208,ai:97.47,ji:99.88},{name:'智元G1',n:3,jb:0.090175,jt:0.045274,ai:43.46,ji:49.79}
];
function E(n,a={}){const e=document.createElementNS('http://www.w3.org/2000/svg',n);for(const[k,v]of Object.entries(a))e.setAttribute(k,v);return e}
function drawOverall(){const g=document.getElementById('overallPlot');g.innerHTML='';const L=170,T=130,W=620,H=260,max=.17;[0,.05,.10,.15].forEach(t=>{let x=L+t/max*W;g.appendChild(E('line',{x1:x,y1:T-20,x2:x,y2:T+H,class:'grid'}));let tx=E('text',{x:x,y:T+H+26,class:'label','text-anchor':'middle'});tx.textContent=t.toFixed(2);g.appendChild(tx)});overall.forEach((d,i)=>{let y=T+i*110;let lab=E('text',{x:L-20,y:y+25,class:'label','text-anchor':'end'});lab.textContent=d.name;g.appendChild(lab);let wb=d.base/max*W, wt=d.trained/max*W;g.appendChild(E('rect',{x:L,y:y,width:wb,height:28,rx:4,class:'bar1'}));g.appendChild(E('rect',{x:L,y:y+38,width:wt,height:28,rx:4,class:'bar2'}));let v1=E('text',{x:L+wb+10,y:y+20,class:'value draggable'});v1.textContent='ckpt-1: '+d.base.toFixed(6);g.appendChild(v1);let v2=E('text',{x:L+wt+10,y:y+58,class:'value draggable'});v2.textContent='ckpt-390000: '+d.trained.toFixed(6)+' ('+d.impr.toFixed(2)+'% ↓)';g.appendChild(v2)});let l1=E('text',{x:L+W+40,y:T+20,class:'label'});l1.textContent='gray: checkpoint-1';g.appendChild(l1);let l2=E('text',{x:L+W+40,y:T+58,class:'label'});l2.textContent='blue: checkpoint-390000';g.appendChild(l2)}
function drawMachine(){const g=document.getElementById('machinePlot');g.innerHTML='';const L=220,T=120,W=760,row=42;[0,25,50,75,100].forEach(t=>{let x=L+t/100*W;g.appendChild(E('line',{x1:x,y1:T-15,x2:x,y2:T+row*machines.length,class:'grid'}));let tx=E('text',{x:x,y:T+row*machines.length+28,class:'label','text-anchor':'middle'});tx.textContent=t;g.appendChild(tx)});machines.forEach((d,i)=>{let y=T+i*row;let lab=E('text',{x:L-16,y:y+19,class:'label','text-anchor':'end'});lab.textContent=d.name;g.appendChild(lab);let w=Math.max(0,d.ji)/100*W;g.appendChild(E('rect',{x:L,y:y,width:w,height:24,rx:4,class:d.ji<90?'bar1':'bar2'}));let val=E('text',{x:L+w+10,y:y+17,class:'value draggable'});val.textContent=d.ji.toFixed(2)+'% (n='+d.n+')';g.appendChild(val)});let xl=E('text',{x:L+W/2,y:T+row*machines.length+62,class:'label draggable','text-anchor':'middle'});xl.textContent='Joint MSE relative improvement (%)';g.appendChild(xl)}
function makeDrag(svg){let sel=null,dx=0,dy=0;function pt(e){let p=svg.createSVGPoint();p.x=e.clientX;p.y=e.clientY;return p.matrixTransform(svg.getScreenCTM().inverse())}svg.querySelectorAll('.draggable').forEach(el=>el.addEventListener('pointerdown',e=>{sel=el;sel.setPointerCapture(e.pointerId);let p=pt(e);dx=p.x-Number(sel.getAttribute('x'));dy=p.y-Number(sel.getAttribute('y'))}));svg.addEventListener('pointermove',e=>{if(!sel)return;let p=pt(e);sel.setAttribute('x',(p.x-dx).toFixed(1));sel.setAttribute('y',(p.y-dy).toFixed(1));updateText(svg.id)});svg.addEventListener('pointerup',()=>sel=null)}
function serialize(id){const s=document.getElementById(id).cloneNode(true);s.setAttribute('xmlns','http://www.w3.org/2000/svg');return new XMLSerializer().serializeToString(s)}
function updateText(id){document.getElementById('svgText').value=serialize(id||'overall')}
async function copySvg(id){await navigator.clipboard.writeText(serialize(id));document.getElementById('svgText').value=serialize(id);alert('SVG copied.')} 
function downloadSvg(id,fn){let blob=new Blob([serialize(id)],{type:'image/svg+xml;charset=utf-8'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fn;document.body.appendChild(a);a.click();a.remove()}
function resetAll(){location.reload()}
drawOverall();drawMachine();makeDrag(document.getElementById('overall'));makeDrag(document.getElementById('machine'));updateText('overall');
</script>
</body>
</html>
